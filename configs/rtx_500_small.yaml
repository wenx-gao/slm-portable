# configs/rtx_500_small.yaml

model:
  hidden_size: 512
  num_layers: 8
  num_heads: 8
  context_window: 512
training:
  batch_size: 4 # Small batch size + Gradient Accumulation
  grad_accum_steps: 8 
  mixed_precision: "fp16" # Essential for Ada architecture



